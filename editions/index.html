<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Prepared Mind, Weekly Reader — Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111111;
    --ink-mid: #3a3a3a;
    --ink-light: #666666;
    --rule: #d8d8d8;
    --accent: #c0392b;
    --bg: #f9f8f5;
    --card: #ffffff;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 19px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .masthead {
    background: #1a1a1a;
    color: white;
    padding: 28px 20px 24px;
  }

  .masthead-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    color: white;
    margin-bottom: 8px;
  }

  .masthead-meta {
    font-size: 13px;
    color: #bbbbbb;
    font-weight: 400;
  }

  .masthead-meta a {
    color: #f0c040;
    text-decoration: none;
  }

  .masthead-meta a:hover {
    text-decoration: underline;
  }

  .content {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 18px 56px;
  }

  .archive-header {
    font-family: 'Libre Baskerville', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    padding-bottom: 14px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 24px;
  }

  .edition-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 22px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    text-decoration: none;
    transition: border-color 0.15s;
  }

  .edition-card:hover {
    border-color: var(--accent);
  }

  .edition-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .edition-number {
    font-family: 'Libre Baskerville', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }

  .edition-date {
    font-size: 14px;
    color: var(--ink-light);
  }

  .edition-count {
    font-size: 14px;
    color: var(--ink-light);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .current-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: white;
    background: var(--accent);
    padding: 2px 8px;
    border-radius: 2px;
    margin-left: 10px;
    vertical-align: middle;
  }

  .footer {
    background: #1a1a1a;
    color: #999;
    padding: 28px 20px;
    font-size: 14px;
    font-weight: 400;
    text-align: center;
    line-height: 1.8;
  }

  .footer strong {
    color: white;
    font-weight: 500;
  }

  @media (min-width: 640px) {
    .masthead { padding: 40px 32px 32px; }
    .masthead-title { font-size: 28px; }
    .content { padding: 48px 28px 72px; }
    .edition-card { padding: 24px 28px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-title">The Prepared Mind, Weekly Reader</div>
  <div class="masthead-meta">Archive &nbsp;•&nbsp; <a href="/">Current edition</a></div>
</header>

<main class="content">
  <h1 class="archive-header">All Editions</h1>
  <div id="edition-list"></div>
</main>

<footer class="footer">
  <strong>The Prepared Mind, Weekly Reader</strong><br>
  Prepared for Tony Sarsam by Tom Burket, word/cairn
</footer>

<script>
// ============================================================
// UPDATE THIS ARRAY WHEN YOU PUBLISH A NEW EDITION
// Most recent edition first. The first entry is treated as current.
// ============================================================
const editions = [
  {
    number: 4,
    date: "April 10, 2026",
    items: 7,
    topics: "AI, Retail, Governance, Space, Archaeology",
    file: null  // null = current edition lives at root index.html
  },
  {
    number: 3,
    date: "April 3, 2026",
    items: 8,
    topics: "Food, Grocery, AI, Governance, Space, Oddly Interesting",
    file: "edition-03.html"
  },
  {
    number: 2,
    date: "March 27, 2026",
    items: 10,
    topics: "Food, Grocery, Business, Tech, Oddly Interesting",
    file: "edition-02.html"
  },
  {
    number: 1,
    date: "March 5, 2026",
    items: 9,
    topics: "Food, Grocery, Business, Tech, Oddly Interesting",
    file: "edition-01.html"
  }
];

// Render
const list = document.getElementById('edition-list');
editions.forEach((ed, i) => {
  const isCurrent = i === 0;
  const href = isCurrent ? '/' : '/editions/' + ed.file;
  const a = document.createElement('a');
  a.className = 'edition-card';
  a.href = href;
  a.innerHTML = `
    <div class="edition-left">
      <div class="edition-number">
        Edition No. ${ed.number}${isCurrent ? '<span class="current-badge">Current</span>' : ''}
      </div>
      <div class="edition-date">${ed.date} &middot; ${ed.topics}</div>
    </div>
    <div class="edition-count">${ed.items} items</div>
  `;
  list.appendChild(a);
});
</script>

</body>
</html>
